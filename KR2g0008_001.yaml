body:
  text: 杜工部詩年譜宋魯訔撰睿宗先天元年壬子正月改太極五月改為延和明皇以是年八月改元按公志及𫝊皆云年五十九卒於大厯五年庚戌詩史云開元元年癸丑公生公上三大禮賦云生陛下淳朴之俗行四十載公天寶十載奏賦年三十有九逆算公是年生吕汲公考公生先天元年壬子天寶十三載奏賦若十三載公當四十三嵗矣唐書宰相表及紀年通譜先天元年壬子而譜以為癸丑集祭房公廣德元年嵗次癸卯而譜以為甲辰皆差一年汲公吕大防始作詩年譜開元元年癸丑三年乙卯公郾城觀公孫弟子舞劍行云開元三年余尚童稚於郾城觀公孫舞劍器年譜以為三年丙辰按公是年才四嵗年必有誤公進鵰賦表云臣素賴先人緒業自七嵗所綴詩筆向四十載矣約千有餘篇則能憶四嵗時事不為誤也十四年丙寅公初游選場壯遊曰往昔十四五出遊翰墨場斯文崔魏徒以我似班揚二十三年乙亥公年二十四公作開元皇帝皇甫淑妃豐碑曰嵗次乙亥十月癸未朔薨又曰野老何知斯文見托不論官閥游夏入文學之科意公尚白衣天寶十載始上三大禮賦起家授河西尉或以為是年未應稱野老當是天寶十載辛卯銘曰列樹拱矣豐碑闕然乃知後來方立碑也但未能考其定於何年二十五年丁丑史云公少不自振客遊吳越齊趙故壯遊曰東下姑蘇臺巳具浮海航到今有遺恨不得窮扶桑歸帆拂天姥中嵗貢舊鄉忤下考功第拜辭京尹堂放蕩齊趙間裘馬頗清狂春登吹臺上冬獵青丘傍遊梁亦曰昔我游宋中惟梁孝王都憶與髙李輩論文入酒壚氣酣登吹臺懷古視平蕪昔遊曰昔與髙李輩晚登單父臺山腳曰昔我遊山東憶戲東嶽陽窮秋立日觀矯首望八荒公居城南嘗預京兆薦貢而考功下之唐初考功試進士開元二十六年戊寅春以考功郎輕徙禮部以春官侍郎主之公之適齊趙當在此嵗以前二十九年辛已公有酹逺祖晉鎮南將軍于洛之首陽酹文十三葉孫甫開元二十九年嵗次辛已天寶元年壬午公年三十一南曺小司冦於我太夫人堂下壘土為山之作系云天寶初六載丁亥公應詔退下元結諭友曰天寶六載詔天下有一藝詣轂下李林甫相國命尚書省皆下之遂賀野無遺賢於庭公上韋左相曰主上頃見徴倐來欲求伸青冥却垂翅蹭蹬無縱鱗上鮮于京兆曰獻納紆皇眷中間謁紫宸破膽遭前政隂謀獨秉鈞正為此邪九載庚寅紀十一月封華嶽十載辛卯公年四十公奏三大禮賦元稹志曰賦奏命宰相試文授右衛率府胄曹吏云公奏賦帝竒之命待制集賢院相試文授河西尉不拜改右衛率府胄曹公官定後戲贈曰不作河西尉凄凉為折腰老夫怕奔走率府且逍遙莫相疑行曰憶獻三賦蓬萊宫自怪一日聲烜赫集賢學士如堵墻觀我落筆中書堂史集皆以為十三載按帝紀十載行三大禮十三載未當郊况表云臣生長陛下淳朴之俗行四十載矣故知當在今嵗原叔云新書作召試京兆府兵曹新書乃今舊書也今書作胄曹進西嶽賦表乃云委學官試文章皆不同除夕曲江族弟位宅守嵗曰四十明朝過年譜云上韋左相詩云鳯厯軒轅紀龍飛四十春壯遊曰放蕩齊趙間裘馬頗清狂快意八九年西歸到咸陽則公歸自齊趙乃應詔奏賦又數年間事也翰林王洙字原叔十三載甲午公年四十三𤣥宗紀秋八月甲子朔文部侍郎韋見素拜中書門下平章事公贄見韋左相詩云龍飛四十春又曰愚䝉但隱淪則此詩似未獻賦前封西嶽賦表云臣本杜陵諸生年過四十又云蓋長安一匹夫耳次嵗國家有事於郊廟幸得奏賦待制於集賢委學官試文章再降恩澤送𨽻有司參列選序則此賦又在三大禮賦後詩文以為十二載未詳紀二月丁丑楊國忠為司空公表云陛下元弼克生司空斯文不可寢巳則此賦當在未封西嶽前而紀封華嶽在九載又當考也十四載乙未公年四十四十一月祿山反陷河北諸郡公有自京赴奉先作注云此年十一月作集注云公在率府欲辭職遂作去矣行而家屬先在奉先詩史云薊北反書未聞公巳逸身畿甸十五載丙申公年四十五是年七月肅宗即位於靈武改元至德祿山僣帝於東京公在奉先以舅氏崔十九翁為白水尉故適白水有髙齊三十韻六月辛未賊入潼關駕幸劍外七月甲子肅宗即位靈武公漸北過彭衙行曰憶昔避賊初北走經險艱夜深彭衙道馮翊界月照白水山屬同州少留周家窪欲出蘆子關公七月寓於鄜州有三川觀漲詩鄜州屬縣曰我經華原來長安北公羸服走靈武賊得之故贈韋評事詩曰昔沒賊中時潛與子同遊公沒賊中有九日藍田崔氏莊以下十三首至德二載丁酉公年四十六公春在賊中曲江行曰少陵野老吞聲哭春日潜行曲江曲自正月乙卯祿山死二月戊子肅宗次鳯翔李光弼敗安慶緒於太原郭子儀敗安慶緒於潼關又敗於永豐倉公西走鳯翔達鳳翔行在曰西憶岐陽信無人遂却回又曰司𨽻章初覩南陽氣巳新又述懷曰去年潼關敗妻子隔絶久今夏草木長脫身得西走元微之志云步謁肅宗行在拜左拾遺舊書云自京師宵遁赴河西謁肅宗於彭原新書云拜右拾遺非是房琯罷相印甫上疏不宜免帝怒詔三司推問以張鎬言帝解赦之公有狀謝口敕又有六月十二日薦岑參諌官狀皆可考新史云自是帝不甚省録公家寓鄜彌年孺弱至餓死許甫往省親吕汲公考云八月墨敕放還鄜州有北征詩舊史云肅宗怒貶甫為華州司功曹非是實録言御史大夫韋陟言當考北征曰皇帝二載秋閏八月初吉杜子將北征蒼茫問家室贈節度李重進曰青袍朝士最苦者白頭拾遺徒步歸閏八月朔甲寅賊安慶緒冦鄜畤渭北節度使李光進戰卻之渭北壘空公得北首鄜路送韋宙同谷曰鑾輿駐鳯翔受詞太白腳秋旋自鄜畤扈從還闕贈嚴賈二閣老曰法駕還雙闕王師下八川比時霑奉引佳氣拂周旋十月丁卯天子還闕公臘日供奉紫宸曰臘日常年暖尚遙今年臘日凍全消十二月上皇至自蜀以蜀郡為南京鳯翔為西京西京為中京乾元元年戊戌公年四十七是嵗二月改元復以載為年春公有紫宸退朝口號賡賈至朝大明宫宣政殿晚出左掖又退朝出左掖直夜題省中壁等詩微之志公左拾遺嵗餘以直言出華州司户悲往事繫曰至德二載甫自京兆金光門出歸鳯翔乾元初從左拾遺移華州掾與親故别因出此門有悲往事曰近得歸京邑移官逺至尊必大臣有不樂公者至華題鄭縣亭子曰雲斷嶽蓮臨大路天晴宫柳暗長春唐官儀功曺主秋賦公有秋策問進士七月代華牧論殘寇狀上朝廷策士文公及冬出潼關東征洛陽道史不載有閿鄉姜七少府設鱠及湖城遇孟雲卿歸劉皓宅飲宿等詩二年巳亥公年四十八春留東都三月九節度之師潰於滏水郭子儀斷盟津退守洛師公有新安吏石壕吏等詩歸華放情山水間嘗遊伏毒寺有憶鄭南曰鄭南伏毒寺瀟灑到江心鮑公詩譜云夏去華之秦公有秋華下苦熱曰七月六日苦炎蒸對食暫餐還不能立秋後題曰平生獨往願惆悵年半百罷官亦由人何事拘形役自是有浩然志史云關輔飢輒棄官去客秦州貧採橡栗自給有秦州二十首曰滿目悲生事因人作逺遊遲回度隴怯浩蕩及關愁公厭秦隴要衝人事煩夥西南命駕游同谷别贊上人曰天長關塞寒嵗莫飢凍逼野風吹征衣欲别向曛黑冬十月發秦州曰我衰更懶拙生事不自謀無食思樂土無衣思南州至同谷作七歌寓同谷不盈月十二月一日發同谷曰始來兹山中休駕喜地僻奈何迫物纍一嵗四行役公自京至華至秦至同谷赴劍南凡四史曰同谷採橡栗自給流落劔外公詩云邑有佳主人又曰臨岐别數子握手淚再滴非寥落而遷殆迫於冦攘也送韋宙從事同谷曰此邦承平日剽劫吏所羞又曰古來無人地今代橫戈矛當時必為羌戎所迫但史不載止云十二月史思明冦陜州公度栗亭趨劍門木皮嶺曰季冬携童稚辛苦赴蜀門鹿頭山曰鹿頭何亭亭是日慰飢渴連山西南斷俯見千里豁冀公柱石姿論道邦國活裴冕鎮成都公遂卜居錦江成都曰我行山川異忽在天一方自古有羇旅我何苦哀傷上元元年庚子公年四十九裴冀公為公卜居成都西郭浣花溪成都記草堂寺府西七里浣花寺三里寺極宏麗公卜居曰浣花流水水西頭主人為卜林塘幽公寓浣花雖有江山之適羈旅牢落之思未免故二年之間有赴青城縣成都西暫如新津出成都寄陶王二少尹寄髙彭州投簡成華兩縣諸子等詩栁芳厯曰髙適乾元初刺彭公乾元初客秦有寄適於彭州上元初適牧蜀而公乃有寄髙彭州詩當考二年辛丑公年五十紀夏四月劔東東川節度兵馬使假子璋反陷綿州節度使李奐奔於成都五月劍南節度使崔光逺克東川假子璋伏誅公戲作花卿歌曰成都猛將有花卿學語小兒知姓名綿州刺史著柘黃我卿掃除即日平子璋髑髏血糢糊手提擲還崔大夫李侯重有此節度人道我卿絶世無舊唐𫝊云梓州刺史假子璋反以兵攻東川節度使奐髙適率州兵與西川節度使崔光逺攻子璋斬之西川牙將花驚定者恃勇既誅子璋大掠東蜀新史云梓屯將假子璋反適從崔光逺討斬之而光逺兵不戢遂大掠天子怒遂以適代為西川節度紀傳與此詩皆不同當知公紀事為審也九月壬寅大赦去上元號稱元年以十一月為嵗首以斗所建為名公草堂即事曰荒村建子月獨樹老夫家春秋變古則書之公此意也年譜與史云嚴武鎮成都甫往依焉新史云上元二年冬黃門侍郎鄭國公嚴武鎮成都奏為節度參謀檢校尚書工部員外郎賜緋魚公先赴成都裴公為卜居浣花里譜𫝊皆非是嚴中丞枉駕見過系云嚴武東川除西川敕除兩川都節制詩云元戎小隊出郊坰問栁尋花到野亭川合東西瞻使節地分南北任流萍辭意皆與𫝊異詩史云地志劍西益彭蜀其州二十有八劍東梓綿劍普十州綿為都㑹肅宗實録子璋盜綿州改元黃龍州曰龍安府代宗實録武京兆少尹御史中丞賊思明阻兵京師頗自矜大命綿州刺史未幾東劍節度詔兩劍一道新𫝊坐房琯貶巴州久之遷東川玉壘記是年崔光逺尹成都花驚定平假難而士卒剽掠士女至斷腕取金詔監軍按其罪十二月恚死寶應元年壬寅上元二年九月改元年二月四月改寶應公年五十一武至成都公奉和嚴中丞西城晚眺時蜀困於調度嚴數從公往來寄題杜二錦江野亭云莫倚善題鸚鵡賦何須不著鵕䴊冠公酬云謝安不倦登臨賞阮籍焉知禮法疏公結廬浣花涉三年草堂曰經營上元始斷手寶應年浣花曰萬里清江上三年落日低四月巳巳代宗即位召武公送嚴入朝曰鼎湖瞻望逺象闕憲章新四海猶多難中原憶老臣送嚴到綿州同登杜使君江樓曰歸朝送使客落景惜登臨詩史召武為太子賔客𫝊還拜京兆尹為二聖山陵橋道使封鄭公遷黃門侍郎公初與武云中丞梓州九日贈武曰大夫此詩曰侍郎再鎮蜀曰上嚴鄭公前後自可考也玩月呈漢中王多在中秋七月劍南西川兵馬使徐知道反八月已未伏誅公吟射洪曰南京亂初定故公欲駕梓至梓已重陽九日登城九日奉寄嚴大夫曰不眠持漢節何路出巴山嚴巴嶺答曰昨向巴山落月時兩鄉千里夢相思時嚴猶未出巴地也秋歸成都迎家遂徑往梓十一月往射洪縣南途中有作南之通泉縣亦梓州邑過郭代公故宅陪王侍御因登東山最髙頂宴姚通泉晚携酒涪江泛舟皆一時作也廣德元年癸卯公年五十二春日梓州登樓曰行路難如此登樓望欲迷又曰厭蜀交遊冷思吳勝事繁應須理舟楫長嘯下荆門公巳有東下之興公送卒員外暫至綿還梓州陪章侍御宴南樓陪章侍御惠義寺秋章梓州水亭時公將適吳楚留别章使君留後曰終作適荆蠻安排用莊叟秋故相房琯薨公有九月壬戍祭房公文公轉遊閬中為閬州王使君進論巴蜀安危表警急曰玉壘雖𫝊檄松州已解圍系云時髙公適領西川節使時吐蕃犯塞為中國患公痛其猖獗疾蜀無善將以守要害明年武再出鎮蜀道始安是嵗召補京兆功曹不赴二年甲辰公年五十三公自梓之閬有閬山歌等詩送李梓州之任并寄章十侍御系云初時罷梓州刺史東川留後將赴朝廷二公交卬正在今春有將赴荆南遊有將赴荆南寄别李劍州遊子曰巴蜀愁誰語吳門興杳然公時意未有所適㑹嚴武復節度劔南東西川公往依焉贈武曰殊方又喜故人來重領還須濟世才嘗怪偏禆終日待不知旌節隔年回房琯薨閬州贈一品公别房太尉墓曰他鄉復行役駐馬别孤墳自閬州領妻子却赴蜀山三首曰汩汩避羣盜悠悠經十年不成向南國復作遊西川將赴成都草堂途中有作先寄嚴鄭公旋錦江贈王侍御曰一别星橋夜三回斗柄春亦曰猶得見殘春微之志曰劔南節度嚴武狀為工部員外郎參謀軍事公揚旗系云二年夏六月成都尹鄭公置酒公堂觀騎士新旗幟曰三州陷犬戎但見西嶺青代宗紀曰廣德元年失松維二州栁芳唐厯乃曰糧運絶西川節度使髙適不能軍吐畨陷松維保三州以公詩考之當然武軍城早秋曰昨夜秋風入漢關朔雲邊雪滿西山更催飛將追驕虜莫遣沙場匹馬還公和曰秋風嫋嫋動髙旌玉帳分弓射虜營巳收滴博雲間戍更奪蓬婆雪外城遣悶曰胡為來幕下只合在舟中黃卷真如律青𫀆也自公公放誕不樂吏檢雖鄭公禮寬心契無每見意史云性𥚹躁傲誕嘗醉登武床瞪視曰嚴挺之乃有此子武亦暴猛外若不忤中銜之一日欲殺甫及梓州刺史章彝集吏於門武將出冠鈎於簾三左右白其毋奔救得止獨殺彝舊史不載以公詩考之武來鎮蜀彛巳交印入覲公再依武相歡洽無恨恨意史當失之永泰元年乙巳公年五十四正月三日竟歸溪上有作簡院內諸公曰白頭趨幕府深覺負平生夏四月庚寅嚴公薨有哭歸櫬詩五月癸丑詔定襄郡王郭英乂節度劔南紀閏十月劔南西山兵馬使崔旰反冦成都郭英乂奔於靈池普州韓澄殺之崔寧𫝊寧本名旰永泰元年武卒行軍司馬杜濟等請郭英乂為節度寧亦丐大將王崇俊朝廷次用英乂英乂恨之召寧寧不敢還英乂自將討之寧還攻英乂英乂不勝走靈池於是劔南楊子琳起瀘州與卭州柏貞節連和討寧明年詔杜鴻漸山西劍南等道副元帥平其亂入成都政事一委寧乃表貞節為卭州刺史子琳為瀘州刺史以和解之大厯三年寧來朝楊子琳襲取成都以公詩考之成都亂再至東川相從行曰我行入東川十步一回首成都亂罷氣蕭瑟浣花草堂亦何有梓州豪傑大者誰本州從事知名久公歸成都止以嚴公再鎮草堂曰昔我去草堂蠻夷塞成都今我歸草堂成都適無虞請陳初亂時反覆乃須㬰大將赴朝廷羣小起異圖中宵斬白馬盟焰氣已粗西取卭南兵北斷劔閣隅布衣數十人亦擁専城居系云即楊子琳柏貞節之徒賤子且奔走三年望東吳弧矢暗江海難為遊五湖不忍竟舍此復來剃榛蕪入門四松在步屧萬竹疏營屋曰愛惜已六載兹辰去千竿以詩訂𫝊云大將赴朝廷羣小起異圖以為嚴公後來公無再歸草堂之跡以為崔旰史云大厯三年入朝寧本名旰至是賜名留其弟守成都楊子琳乘間起瀘州以精騎數千襲據其城寧妾任募勇士自將以進子琳引去公厭蜀思吳下荆門遂南下夏艤戎州燕戎州使君東樓渝州候嚴六侍御至忠州有燕使君姪宅及夏泊雲安至十二月一日三首今朝臘月春意動雲安縣前江可憐公巳不樂雲安欲遷夔趙叟以為永泰元年四月嚴武卒五月下忠渝大厯元年在雲安與詩文皆差一年髙常侍永泰元年正月卒公有聞髙常侍亡系云忠州作知公以永泰元年下渝忠但草堂所紀却是嚴公薨後事不敢妄定姑從舊次大厯元年丙午公年五十五題子規曰峽裏雲安縣江樓翼瓦齊移居夔州郭曰伏枕雲安縣遷居白帝城春知催栁别江與放船清客居曰西南失大將商旅自星奔今又降元戎已聞動行軒此詩方及失大將聞杜鴻漸出鎮與史年亦差暮春遷居瀼西有暮春題瀼西新賃草屋五首大厯二年丁未公年五十六在夔州西閣立春曰巫峽寒江那對眼杜陵逺客不勝悲雨詩曰冥冥甲子雨已度立春時資治通鑑大厯二年正月辛亥朔至十三日甲子諺云春甲子雨赤地千里移居赤甲有入宅赤甲二詩曰卜居赤甲遷居新兩見巫山楚水春三月自赤甲遷居瀼西有卜居暮春題瀼西新賃草屋五首秋又移居東屯有自瀼西荆扉且移居東屯茅屋四首曰東屯復瀼西一種住青溪來往皆茅屋淹留為稻畦訖冬居夔大厯三年戊申公年五十七太嵗日曰楚岸行將老巫山坐復春時第五弟漂泊江左近無消息逺懷穎觀等曰陽翟空知處荆南近得書正月中旬定出三峽曰自汝到荆府書來數喚吾頌椒添風詠禁火卜歡娛公因觀在荆陽遂發棹有將别巫峽贈南鄉兄瀼西果園四十畝曰正月喧鶯末兹辰放鷁初夏有和江陵宋大少府雨後同諸公及舍弟宴書齊秋又不安於荆南舟中出南浦奉寄鄭少尹曰更欲投何處飄然去此都是秋移居公安荆南屬邑府南九十里復東下發劉郎浦十道志在荆州曰挂帆早發劉郎浦疾風飄飄昏亭午曉發公安系云數月憩息此縣泊嶽陽城下巴陵郡曰岸風翻夕浪舟雪灑寒燈則冬在嶽陽矣大厯四年已酉公年五十八陪裴使君登嶽陽樓曰雪岸叢梅發春泥百草生敢違漁父問從此更南征公將適潭詩譜云此年春自嶽陽至潭遂如衡畏熱復回夏將如襄陽秋將歸秦皆不果卒留潭自是率舟居詠懷及上水遣懷及銅官渚守風皆自嶽陽入潭時作蓋自嶽之潭之衡為上水而自衡回潭為順水詩皆可考五年庚戌公年五十九春去潭至衡清明曰著處繁華憐是日長沙千人萬人出則公在潭至夏湖南兵馬使臧玠殺其團練使崔灌又是嵗湖南將王國良反及西原蠻冦州縣故公益南至衡山縣謁文宣新學堂呈陸宰及入衡州備述臧玠等亂末云橘井舊地宅仙山引舟航此行厭暑雨厥土聞清涼諸舅割符近開緘書札光橘井在郴州諸舅謂崔偉前有送二十三舅録事之楊郴州詩公將往依焉公又至耒陽州東南遊嶽祠大水遽至涉旬不得食聶耒陽以公阻水致酒肉療饑荒江詩得代懷興盡本韻至縣呈聶令𫝊云令嘗饋牛䏑白酒大醉一夕卒王彥輔辨之為詳以詩考之公在耒陽畏瘴癘是夏賊當巳平乃沿湘而下故回棹之什曰衡嶽江湖大蒸池疫癘偏羅含湘中記蒸水注湘又順浪翻堪倚回帆又省牽登舟將適漢陽曰春宅棄汝去秋帆催客歸又暮秋將歸秦留别湖南幕府親友則秋巳還潭暮秋北首其卒當在潭嶽之間秋冬之交元微之志云子美之孫嗣業啓子美之柩襄祔事於偃師途次於荆拜余為志辭不能絶其略云扁舟下荆楚竟以寓卒旅殯嶽陽吕汲公年譜云大厯五年庚戌是年夏還襄漢卒於嶽陽以詩考之大略可見𫝊言卒於耒陽非也汲公云是夏亦非也今九域志衡州有公墓又未知信然或附㑹邪杜工部詩年譜
