body:
  text: 杜工部詩年譜傳記類二名人之屬提要臣等謹案杜工部詩年譜一卷宋魯訔撰訔字季欽嘉興人官至福建提點刑獄公事周必大平園集有訔墓志述其官階始未甚詳諸書或云字季卿或云海鹽人或云仕至大府卿皆誤也訔曽注杜詩今存者惟此譜篇首有訔編次杜工部詩序末有王士禎跋謂甫年譜創始於吕汲公大防訔以甫生於睿宗先天元年壬子卒於大厯五年庚戌蓋承吕譜之舊也考甫生卒之嵗諸書往往錯互舊唐書謂甫卒於永泰二年永泰在大厯之前甫詩有大厯三年以下諸作則舊書為誤王觀國辨之是也然觀國云甫生於先天元年癸丑卒於大厯五年辛亥不知癸丑乃先天之二年即開元元年辛亥乃大厯六年則觀國亦未深考矣元禛作甫墓志云享年五十九王洙原敘注子美詩序曰大厯五年甫下夾入湖南遊衡山寓居耒陽五年夏一夕醉飽卒大厯五年為庚戌嵗上距先天元年壬子適五十有九年則甫生於壬子無疑訔此譜根據吕譜未嘗誤也姚桐夀樂郊私語云杜少陵集自遊龍門至過洞庭詩目次第為季卿編定一循少陵平生行迹可以見其詩法近時滏陽張氏吳江朱氏所注杜詩其年譜大率仿此而推拓之知密於趙子櫟譜多矣雖間有附會又烏可以一眚掩乎乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀杜工部詩年譜原序騷人雅士同知祖尚少陵同欲模楷聲韻同苦其意律深嚴難讀也余謂少陵老人初不事艱澀左隱以病人其平易處有賤夫老婦所可道者至其深純宏妙千古不可追迹則序事穩實立意渾大遇物寫難狀之景紓情出不説之意借古的確感時深逺若江海浩溔溔以沼切大水貌風雲蕩汩蛟龍黿鼉出沒其間而變化莫測風澄雲霽象緯回薄錯峙偉麗細大無不可觀離而序之次其先後時危平俗媺惡山川夷險風物明晦公之所寓舒局皆可槩見如陪公杖屨而遊四方數百年間猶對面語何患於難讀耶名公巨儒譜敘注釋是不一家用意率過異説如蝟余因舊集略加編次古詩近體一其先後摘諸家之善有考於當時事實及地理嵗月與古語之的然者聊注其下若其意律乃詩之六經神會意得隨人所到不敢易而言之敘次既倫讀之者如親罹艱棘虎狼之慘為可驚愕目見當時氓庶被削刻轉塗炭為可憫因感公之流徙始而適中而瘁卒至為少年輩侮忽以訖死為可傷也紹興癸酉五月晦日丹丘冷齋魯訔序
